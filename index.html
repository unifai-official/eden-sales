<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eden — AI לעסקים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Heebo', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f7;
    margin: 0;
    height: 100%;
    overflow: hidden;
  }

  /* ─── TAB BAR ─────────────────────────────── */
  .tab-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 52px;
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 0.5px solid rgba(0, 0, 0, 0.08);
  }

  .tab-bar .logo {
    position: absolute;
    right: 20px;
    font-size: 16px;
    font-weight: 700;
    color: #1d1d1f;
    letter-spacing: -0.3px;
    user-select: none;
  }

  .tab-bar .logo span {
    color: #0071e3;
  }

  .tab-pills {
    display: flex;
    gap: 2px;
    background: rgba(0, 0, 0, 0.05);
    border-radius: 10px;
    padding: 3px;
  }

  .tab-btn {
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 500;
    padding: 6px 22px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: #6e6e73;
    background: transparent;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    user-select: none;
  }

  .tab-btn:hover {
    color: #1d1d1f;
  }

  .tab-btn.active {
    background: #ffffff;
    color: #1d1d1f;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08), 0 0.5px 1px rgba(0, 0, 0, 0.04);
  }

  /* ─── FRAME CONTAINER ──────────────────────── */
  .frame-container {
    position: fixed;
    top: 52px;
    left: 0;
    right: 0;
    bottom: 0;
  }

  .tab-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }

  .tab-frame.active {
    display: block;
  }
</style>
</head>
<body>

<nav class="tab-bar">
  <div class="logo">Eden<span>.</span></div>
  <div class="tab-pills">
    <button class="tab-btn active" data-tab="sales">מכירות</button>
    <button class="tab-btn" data-tab="services">שירותים</button>
  </div>
</nav>

<div class="frame-container">
  <iframe id="frame-sales" class="tab-frame active" src="eden_sales.html"></iframe>
  <iframe id="frame-services" class="tab-frame" src="eden-services.html"></iframe>
</div>

<script>
  const buttons = document.querySelectorAll('.tab-btn');
  const frames = {
    sales: document.getElementById('frame-sales'),
    services: document.getElementById('frame-services')
  };

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;

      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      Object.values(frames).forEach(f => f.classList.remove('active'));
      frames[tab].classList.add('active');
    });
  });
</script>

</body>
</html>
